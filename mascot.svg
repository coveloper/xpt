<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 305">

  <!-- ══════════════════════════════════
       TAIL FEATHERS  (lowest layer)
       ══════════════════════════════════ -->

  <!-- Red feather -->
  <path d="M 208 228 C 220 250 226 272 220 300"
        stroke="#D32F2F" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Blue feather -->
  <path d="M 220 234 C 235 257 242 278 240 302"
        stroke="#1565C0" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Yellow feather -->
  <path d="M 200 225 C 212 248 216 270 210 297"
        stroke="#F9A825" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Dark cartoon outlines on feathers -->
  <path d="M 208 228 C 220 250 226 272 220 300"
        stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 220 234 C 235 257 242 278 240 302"
        stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 200 225 C 212 248 216 270 210 297"
        stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ══════════════════════════════════
       BODY
       ══════════════════════════════════ -->

  <!-- Drop shadow -->
  <path d="M 134 162 C 162 144 216 142 250 166 C 270 182 270 216 258 242 C 246 264 220 278 190 278 C 162 280 132 266 118 244 C 106 224 110 196 120 176 C 124 168 130 164 134 162 Z"
        fill="#1B5E20" opacity="0.28" transform="translate(5,6)"/>

  <!-- Body base -->
  <path d="M 134 162 C 162 144 216 142 250 166 C 270 182 270 216 258 242 C 246 264 220 278 190 278 C 162 280 132 266 118 244 C 106 224 110 196 120 176 C 124 168 130 164 134 162 Z"
        fill="#43A047"/>

  <!-- Body shadow zone (right / back) -->
  <path d="M 215 148 C 248 164 270 196 262 236 C 252 260 224 276 192 278 C 218 268 248 248 254 220 C 260 196 248 168 215 148 Z"
        fill="#2E7D32" opacity="0.55"/>

  <!-- Body highlight (left / chest) -->
  <path d="M 140 170 C 130 190 126 218 130 242 C 134 256 146 268 162 272 C 146 264 130 248 128 226 C 124 205 128 184 140 170 Z"
        fill="#81C784" opacity="0.6"/>

  <!-- Body outline -->
  <path d="M 134 162 C 162 144 216 142 250 166 C 270 182 270 216 258 242 C 246 264 220 278 190 278 C 162 280 132 266 118 244 C 106 224 110 196 120 176 C 124 168 130 164 134 162 Z"
        fill="none" stroke="#1A1A1A" stroke-width="4.5" stroke-linejoin="round"/>

  <!-- ══════════════════════════════════
       WING  (overlaid on body)
       ══════════════════════════════════ -->

  <!-- Wing base -->
  <path d="M 176 160 C 212 150 258 165 264 200 C 268 226 256 252 236 264 C 216 274 193 273 180 262 C 167 250 163 225 163 204 C 163 183 168 166 176 160 Z"
        fill="#388E3C"/>

  <!-- Wing shadow (bottom-right edge) -->
  <path d="M 230 158 C 258 172 268 202 262 232 C 255 254 238 268 220 272 C 240 262 258 242 260 215 C 262 190 250 166 230 158 Z"
        fill="#2E7D32" opacity="0.5"/>

  <!-- Wing highlight (upper-left) -->
  <path d="M 180 164 C 214 155 252 168 260 188 C 248 172 214 158 180 164 Z"
        fill="#66BB6A" opacity="0.5"/>

  <!-- Wing feather lines -->
  <path d="M 180 206 C 212 200 248 207 262 218" stroke="#2E7D32" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 176 224 C 208 219 246 225 261 234" stroke="#2E7D32" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 174 241 C 202 237 234 242 252 249" stroke="#2E7D32" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Wing outline -->
  <path d="M 176 160 C 212 150 258 165 264 200 C 268 226 256 252 236 264 C 216 274 193 273 180 262 C 167 250 163 225 163 204 C 163 183 168 166 176 160 Z"
        fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linejoin="round"/>

  <!-- ══════════════════════════════════
       HEAD
       ══════════════════════════════════ -->

  <!-- Drop shadow -->
  <circle cx="133" cy="97" r="64" fill="#1B5E20" opacity="0.22" transform="translate(5,6)"/>

  <!-- Head base -->
  <circle cx="128" cy="91" r="64" fill="#43A047"/>

  <!-- Head shadow (right / back) -->
  <path d="M 158 34 C 182 50 192 78 188 108 C 184 136 168 156 148 162 C 170 154 186 130 190 106 C 194 80 180 52 158 34 Z"
        fill="#2E7D32" opacity="0.45"/>

  <!-- Head highlight (upper-left) -->
  <ellipse cx="106" cy="68" rx="28" ry="20" fill="#81C784" opacity="0.55"/>

  <!-- Head outline -->
  <circle cx="128" cy="91" r="64" fill="none" stroke="#1A1A1A" stroke-width="4.5"/>

  <!-- ══════════════════════════════════
       FACE PATCH  (yellow bare skin,
       Amazon parrot style)
       ══════════════════════════════════ -->

  <!-- Face patch base -->
  <path d="M 118 124 C 96 120 76 108 70 92 C 64 76 74 60 92 56 C 110 52 128 64 132 82 C 136 100 130 120 118 124 Z"
        fill="#FFF176"/>

  <!-- Face patch inner shadow (gives depth) -->
  <path d="M 118 124 C 100 121 82 112 75 100 C 83 112 100 120 118 124 Z"
        fill="#F9E040" opacity="0.7"/>

  <!-- Face patch highlight -->
  <ellipse cx="97" cy="72" rx="14" ry="10" fill="white" opacity="0.4"/>

  <!-- Face patch outline -->
  <path d="M 118 124 C 96 120 76 108 70 92 C 64 76 74 60 92 56 C 110 52 128 64 132 82 C 136 100 130 120 118 124 Z"
        fill="none" stroke="#1A1A1A" stroke-width="3"/>

  <!-- ══════════════════════════════════
       EYE
       ══════════════════════════════════ -->

  <!-- Eye white socket -->
  <circle cx="100" cy="80" r="20" fill="white" stroke="#1A1A1A" stroke-width="3.5"/>
  <!-- Iris (golden-orange) -->
  <circle cx="100" cy="80" r="16" fill="#FF8F00"/>
  <!-- Iris inner shadow -->
  <path d="M 90 88 C 86 80 90 72 100 70 C 92 72 88 80 90 88 Z" fill="#E65100" opacity="0.5"/>
  <!-- Pupil -->
  <circle cx="100" cy="80" r="11" fill="#1A1A2E"/>
  <!-- Pupil gloss -->
  <circle cx="100" cy="80" r="7"  fill="#263050"/>
  <!-- Primary shine (large) -->
  <circle cx="108" cy="72" r="6"   fill="white"/>
  <!-- Secondary shine (small) -->
  <circle cx="93"  cy="87" r="2.5" fill="white" opacity="0.75"/>

  <!-- ══════════════════════════════════
       BEAK  (hooked parrot beak)
       ══════════════════════════════════ -->

  <!-- Upper beak base -->
  <path d="M 68 86 C 50 78 32 84 28 100 C 24 114 36 128 54 128 C 70 128 80 116 80 104 C 80 94 74 88 68 86 Z"
        fill="#607D8B"/>

  <!-- Upper beak shadow zone -->
  <path d="M 65 102 C 48 102 34 110 36 120 C 44 128 54 128 54 128 C 42 124 36 114 40 106 C 44 98 56 100 65 102 Z"
        fill="#37474F" opacity="0.65"/>

  <!-- Upper beak highlight -->
  <path d="M 68 86 C 52 80 36 86 30 98 C 36 86 52 80 68 86 Z"
        fill="#B0BEC5" opacity="0.7"/>

  <!-- Upper beak outline -->
  <path d="M 68 86 C 50 78 32 84 28 100 C 24 114 36 128 54 128 C 70 128 80 116 80 104 C 80 94 74 88 68 86 Z"
        fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linejoin="round"/>

  <!-- Lower beak base -->
  <path d="M 72 122 C 56 124 40 132 38 144 C 36 154 48 160 64 156 C 78 152 86 140 84 128 C 82 120 78 120 72 122 Z"
        fill="#455A64"/>

  <!-- Lower beak highlight -->
  <path d="M 72 122 C 58 122 44 128 40 136 C 46 128 60 122 72 122 Z"
        fill="#78909C" opacity="0.65"/>

  <!-- Lower beak outline -->
  <path d="M 72 122 C 56 124 40 132 38 144 C 36 154 48 160 64 156 C 78 152 86 140 84 128 C 82 120 78 120 72 122 Z"
        fill="none" stroke="#1A1A1A" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Beak commissure line (where beaks meet) -->
  <path d="M 74 122 C 60 120 44 120 32 120"
        stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>

  <!-- ══════════════════════════════════
       BRANCH
       ══════════════════════════════════ -->

  <!-- Branch drop shadow -->
  <path d="M 20 268 C 82 264 162 270 268 256"
        stroke="#3E1C02" stroke-width="30" stroke-linecap="round" fill="none" opacity="0.28" transform="translate(4,6)"/>

  <!-- Branch main body -->
  <path d="M 18 264 C 80 260 160 266 266 252"
        stroke="#9C6B3C" stroke-width="28" stroke-linecap="round" fill="none"/>

  <!-- Branch shadow underside -->
  <path d="M 22 272 C 84 268 162 274 264 260"
        stroke="#6D4C41" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Branch highlight (top edge) -->
  <path d="M 24 256 C 84 253 162 258 264 245"
        stroke="#C4956A" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Branch texture / bark knots -->
  <ellipse cx="90"  cy="263" rx="14" ry="6" fill="#7A5230" opacity="0.38"/>
  <ellipse cx="198" cy="259" rx="11" ry="5" fill="#7A5230" opacity="0.32"/>

  <!-- Branch outline (top) -->
  <path d="M 18 264 C 80 260 160 266 266 252"
        stroke="#1A1A1A" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- ══════════════════════════════════
       FEET  (scalloped toes, on top of branch)
       ══════════════════════════════════ -->

  <!-- ── LEFT FOOT ── -->
  <!-- Ankle -->
  <ellipse cx="148" cy="254" rx="9" ry="11" fill="#FF8F00" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Front toe (points left) -->
  <path d="M 142 256 C 128 262 115 262 106 260"
        stroke="#FF8F00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 142 256 C 128 262 115 262 106 260"
        stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Knuckle bumps on front toe -->
  <circle cx="130" cy="260" r="5"   fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="118" cy="261" r="4.5" fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Middle toe (points down) -->
  <path d="M 150 260 C 146 271 142 280 138 285"
        stroke="#FF8F00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 150 260 C 146 271 142 280 138 285"
        stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="144" cy="272" r="4.5" fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Back toe (points right) -->
  <path d="M 156 256 C 168 262 178 263 186 261"
        stroke="#FF8F00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 156 256 C 168 262 178 263 186 261"
        stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="170" cy="261" r="4.5" fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- ── RIGHT FOOT ── -->
  <!-- Ankle -->
  <ellipse cx="180" cy="252" rx="9" ry="11" fill="#FF8F00" stroke="#1A1A1A" stroke-width="2.5"/>

  <!-- Front toe -->
  <path d="M 174 254 C 160 260 146 260 138 258"
        stroke="#FF8F00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 174 254 C 160 260 146 260 138 258"
        stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="162" cy="258" r="5"   fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>
  <circle cx="150" cy="259" r="4.5" fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Middle toe -->
  <path d="M 182 258 C 178 269 174 278 170 283"
        stroke="#FF8F00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 182 258 C 178 269 174 278 170 283"
        stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="176" cy="270" r="4.5" fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Back toe -->
  <path d="M 188 254 C 200 260 211 261 218 259"
        stroke="#FF8F00" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 188 254 C 200 260 211 261 218 259"
        stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <circle cx="202" cy="259" r="4.5" fill="#FFB74D" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- ══════════════════════════════════
       BREAKPOINT MARKER
       (Xcode-style red dot — xpt easter egg)
       ══════════════════════════════════ -->

  <circle cx="252" cy="252" r="14"  fill="#E53935" stroke="#1A1A1A" stroke-width="3"/>
  <circle cx="252" cy="252" r="8"   fill="#FF6B6B" opacity="0.38"/>
  <circle cx="246" cy="246" r="4.5" fill="white"   opacity="0.7"/>

</svg>
